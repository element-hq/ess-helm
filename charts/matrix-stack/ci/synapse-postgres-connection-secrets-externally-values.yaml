# source_fragments: init-secrets-disabled.yaml server-name.yaml synapse-minimal.yaml synapse-postgres-connection-secrets-externally.yaml synapse-postgres-secrets-externally.yaml synapse-secrets-externally.yaml
# DO NOT EDIT DIRECTLY. Edit the fragment files to add / modify / remove values

deploymentMarkers:
  enabled: false
elementAdmin:
  enabled: false
elementWeb:
  enabled: false
initSecrets:
  enabled: false
matrixAuthenticationService:
  enabled: false
matrixRTC:
  enabled: false
serverName: ess.localhost
synapse:
  appservices:
    - secret: "{{ $.Release.Name }}-synapse-external"
      secretKey: bridge_registration.yaml
  ingress:
    host: synapse.ess.localhost
  macaroon:
    secret: "{{ $.Release.Name }}-synapse-external"
    secretKey: macaroon
  postgres:
    database:
      secret: "{{ $.Release.Name }}-synapse-external"
      secretKey: postgresDatabase
    host:
      secret: "{{ $.Release.Name }}-synapse-external"
      secretKey: postgresHost
    password:
      secret: "{{ $.Release.Name }}-synapse-external"
      secretKey: postgresPassword
    user:
      secret: "{{ $.Release.Name }}-synapse-external"
      secretKey: postgresUser
  registrationSharedSecret:
    secret: "{{ $.Release.Name }}-synapse-external"
    secretKey: registrationSharedSecret
  signingKey:
    secret: "{{ $.Release.Name }}-synapse-external"
    secretKey: signingKey
wellKnownDelegation:
  enabled: false
