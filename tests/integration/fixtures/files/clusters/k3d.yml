apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: ess-helm
# Until k3d comes with a recent k8s/k3s version
image: rancher/k3s:v1.34.2-k3s1
agents: 0
servers: 1
ports:
- port: 127.0.0.1:80:80
  nodeFilters: [loadbalancer]
- port: 127.0.0.1:443:443
  nodeFilters: [loadbalancer]
  # Services node port range
  # Static range: 30000-30015 (first 16 ports)
  # Dynamic range: 30016-30100 (remaining 85 ports)
- port: 127.0.0.1:30000-30100:30000-30100
  nodeFilters: [server:*]
env:
- envVar: K3S_DEBUG=true
  nodeFilters:
    - server:*
options:
  k3d:
    wait: true
  k3s:
    extraArgs:
    - arg: "--kubelet-arg=container-log-max-size=100Mi"
      nodeFilters: [servers:*]
    - arg: "--kubelet-arg=container-log-max-files=10"
      nodeFilters: [servers:*]
    - arg: "--kube-apiserver-arg=audit-log-path=/var/log/kubernetes/kube-apiserver-audit.log"
      nodeFilters: [servers:*]
    - arg: "--kube-apiserver-arg=audit-policy-file=/etc/kubernetes/policies/audit-policy.yaml"
      nodeFilters: [servers:*]
    - arg: "--kube-apiserver-arg=service-node-port-range=30000-30100"
      nodeFilters: [servers:*]
  runtime:
    ulimits:
    - name: nofile
      soft: 100000
      hard: 100000
files:
- source: audit-policy.yml
  destination: /etc/kubernetes/policies/audit-policy.yaml
  nodeFilters: [servers:*]
- source: traefik.yml
  destination: /var/lib/rancher/k3s/server/manifests/traefik-config.yaml
  nodeFilters: [servers:*]
registries:
  create:
    name: k3d-ess-helm-registry
    host: 127.0.0.1
    hostPort: "5000"
  # The k3d created registry will be available at localhost:5000 externally and so that's what we'll tag imges with
  # The below makes it available internally at the same address
  config: |
    mirrors:
      "localhost:5000":
        endpoint:
          - http://k3d-ess-helm-registry:5000
