[project]
name = "ess-migration-tool"
version = "0.1.1.dev1"
requires-python = ">=3.11.7,<4.0"
dependencies = [
  "cryptography>=46.0.5",
  "jsonschema>=4.26.0",
  "pyyaml>=6.0.3",
  "rapidfuzz>=3.14.3",
]

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"

[project.scripts]
ess-migration-tool = "ess_migration_tool.__main__:main"

[tool.towncrier]
directory = "newsfragments"
name = "ESS Migration Tool"
filename = "CHANGELOG.md"

[tool.towncrier.fragment.misc]
name = "Misc"
showcontent = true
