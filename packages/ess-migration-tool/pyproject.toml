[project]
name = "ess-migration-tool"
version = "0.1.0"
requires-python = ">=3.11.7,<4.0"
dependencies = [
  "cryptography>=46.0.5",
  "pyyaml>=6.0.3",
  "rapidfuzz>=3.14.3",
]

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"

[project.scripts]
ess-migration-tool = "ess_migration_tool.__main__:main"

[tool.towncrier]
directory = "newsfragments"
name = "ESS Migration Script"
filename = "CHANGELOG.md"

[tool.uv]
[dependency-groups]
dev = [
        "ruff>=0.15.4",
        "pytest>=8.4.2",
        "mypy>=1.19.1",
        "types-pyyaml>=6.0.12.20250915",
        "types-cryptography>=3.3.23.2",
        "types-jsonschema>=4.26.0.20260202",
]
